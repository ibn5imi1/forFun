<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .heart {
        display: inline-block;
        animation: beat 1s infinite;
      }
      body {
        background-color: pink;
      }
      @keyframes beat {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div id="content"></div>

    <script>
      let current = 1;
      let max = 1000000;
      let batch = 1000; // كم سطر يضيف كل مرة

      function loadItems() {
        let container = document.getElementById("content");

        for (let i = 0; i < batch && current <= max; i++) {
          container.innerHTML +=
            current +
            "- سارة أم تسنيم حبيبتي للأبد <span class='heart'>❤️💙</span><br>";
          current++;
        }
      }

      loadItems(); // أول تحميل

      window.addEventListener("scroll", function () {
        if (
          window.innerHeight + window.scrollY >=
          document.body.offsetHeight - 10
        ) {
          loadItems();
        }
      });
    </script>
  </body>
</html>
